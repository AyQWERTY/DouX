name: Build Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: ${{ runner.os }}-theos-sdk-v1

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Install ldid
        run: brew install ldid xz

      - name: Install Theos (Roothide)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/theos
          export THEOS=~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          git clone --recursive https://github.com/roothide/theos.git ~/theos

      - name: Install iOS SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/theos/sdks
          cd ~/theos/sdks
          for i in {1..3}; do
            curl -L -o iPhoneOS16.5.sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz && break
            echo "SDK download failed. Retrying in 5 seconds..."
            sleep 5
          done
          tar -xf iPhoneOS16.5.sdk.tar.xz
          rm iPhoneOS16.5.sdk.tar.xz

      - name: Build (rootless debug)
        run: |
          export THEOS=~/theos
          mkdir -p build-artifacts

          ORIG_CONTROL=$(cat control)
          BASE_PKG_NAME=$(grep -i '^Package:' control | awk '{print $2}' | tr -d '\r')

          # Build debug
          sed -i.bak "s/^Package:.*/Package: ${BASE_PKG_NAME}-debug/" control
          rm -rf packages
          make clean
          make package DEBUG=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64e
          if ls packages/*.deb 1> /dev/null 2>&1; then
            DEBUG_PKG=$(find packages -name "*.deb" -type f | head -1)
            cp "$DEBUG_PKG" "build-artifacts/debug-rootless.deb"
          fi
          echo "$ORIG_CONTROL" > control

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: build-artifacts/